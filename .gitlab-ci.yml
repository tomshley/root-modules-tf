include:
  - project: 'tomshley/brands/global/tware/tech/products/provisioning/cicd-pipelines'
    ref: 'v0.5.0'
    file: '/adapters/gitlab/ci/adapter.yml'

variables:
  BASE_CONTAINERS_REGISTRY: registry.gitlab.com/tomshley/brands/global/tware/tech/products/provisioning/base-containers
  BASE_CONTAINERS_UPSTREAM_TAG: "0.4.3"
  CICD_PIPELINES_RUNNER_TAG: "0.5.0"

# Disable mirror sync job (not needed for this project)
tomshley-cicd-mirror-sync:
  rules:
    - when: never

# ---------------------------------------------------------------------------
# Terraform Module Upload
# ---------------------------------------------------------------------------
publish-terraform-modules:
  extends:
    - .flow-artifact-publish
  image: curlimages/curl:8.12.1
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_TAG'
      when: on_success
    - when: never
  script:
    - |
      TERRAFORM_MODULE_VERSION="$(cat "${CI_PROJECT_DIR}/VERSION")"
      if [ -n "${TOMSHLEY_CICD_BUILD_REVISION}" ]; then
        TERRAFORM_MODULE_VERSION="${TERRAFORM_MODULE_VERSION}-${TOMSHLEY_CICD_BUILD_REVISION}"
      fi
      echo "Publishing terraform modules version: ${TERRAFORM_MODULE_VERSION}"
      FOUND_MODULES=0
      FAILED=0

      for MODULE_DIR in "${CI_PROJECT_DIR}"/terraform/modules/*/; do
        [ -d "${MODULE_DIR}" ] || continue
        FOUND_MODULES=$((FOUND_MODULES + 1))

        MODULE_SHORTNAME="$(basename "${MODULE_DIR}")"
        MODULE_NAME="$(echo "${CI_PROJECT_NAME}-${MODULE_SHORTNAME}" | tr " _" -)"

        case "${MODULE_SHORTNAME}" in
          gcp-*)             MODULE_SYSTEM="google" ;;
          aws-*|eks-*)       MODULE_SYSTEM="aws" ;;
          cf-*|cloudflare-*) MODULE_SYSTEM="cloudflare" ;;
          confluent-*)       MODULE_SYSTEM="confluent" ;;
          *)                 MODULE_SYSTEM="local" ;;
        esac

        ARCHIVE_PATH="/tmp/${MODULE_NAME}-${MODULE_SYSTEM}-${TERRAFORM_MODULE_VERSION}.tgz"
        PACKAGE_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/terraform/modules/${MODULE_NAME}/${MODULE_SYSTEM}/${TERRAFORM_MODULE_VERSION}/file"

        echo "=== Uploading ${MODULE_NAME}/${MODULE_SYSTEM}/${TERRAFORM_MODULE_VERSION} ==="

        if ! tar -vczf "${ARCHIVE_PATH}" -C "${MODULE_DIR}" --exclude=./.git .; then
          echo "ERROR: Failed to package module ${MODULE_SHORTNAME}"
          FAILED=$((FAILED + 1))
          continue
        fi

        if ! curl --fail-with-body --location \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "${ARCHIVE_PATH}" \
          "${PACKAGE_URL}"; then
          echo "ERROR: Failed to upload module ${MODULE_SHORTNAME}"
          FAILED=$((FAILED + 1))
        fi
      done

      if [ "${FOUND_MODULES}" -eq 0 ]; then
        echo "ERROR: No terraform modules found in ${CI_PROJECT_DIR}/terraform/modules/"
        exit 1
      fi

      if [ "${FAILED}" -gt 0 ]; then
        echo "ERROR: ${FAILED} module(s) failed to publish"
        exit 1
      fi
