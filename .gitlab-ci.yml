stages:
  - deploy

upload:
  stage: deploy
  image: curlimages/curl:latest
  variables:
    TERRAFORM_MODULE_1_SHORTNAME: gcp-gke-cluster
    TERRAFORM_MODULE_1_NAME: ${CI_PROJECT_NAME}-${TERRAFORM_MODULE_1_SHORTNAME}                 # The name of your Terraform module, must not have any spaces or underscores (will be translated to hyphens).
    TERRAFORM_MODULE_1_DIR: ${CI_PROJECT_DIR}/terraform/modules/${TERRAFORM_MODULE_1_SHORTNAME}      # The relative path to the root directory of the Terraform project.
    TERRAFORM_MODULE_1_SYSTEM: google
    TERRAFORM_MODULE_2_SHORTNAME: gcp-gke-external-nat
    TERRAFORM_MODULE_2_NAME: ${CI_PROJECT_NAME}-${TERRAFORM_MODULE_2_SHORTNAME}                 # The name of your Terraform module, must not have any spaces or underscores (will be translated to hyphens).
    TERRAFORM_MODULE_2_DIR: ${CI_PROJECT_DIR}/terraform/modules/${TERRAFORM_MODULE_2_SHORTNAME}      # The relative path to the root directory of the Terraform project.
    TERRAFORM_MODULE_2_SYSTEM: google
    TERRAFORM_MODULE_3_SHORTNAME: gcp-gke-nodepool-multithreaded-service
    TERRAFORM_MODULE_3_NAME: ${CI_PROJECT_NAME}-${TERRAFORM_MODULE_2_SHORTNAME}                 # The name of your Terraform module, must not have any spaces or underscores (will be translated to hyphens).
    TERRAFORM_MODULE_3_DIR: ${CI_PROJECT_DIR}/terraform/modules/${TERRAFORM_MODULE_2_SHORTNAME}      # The relative path to the root directory of the Terraform project.
    TERRAFORM_MODULE_3_SYSTEM: google                                                           # The system or provider your Terraform module targets (ex. local, aws, google).

  script:
    - TERRAFORM_MODULE_VERSION="$(cat ${CI_PROJECT_DIR}/VERSION)"
    - TERRAFORM_MODULE_1_NAME=$(echo "${TERRAFORM_MODULE_1_NAME}" | tr " _" -) # module-name must not have spaces or underscores, so translate them to hyphens
    - tar -vczf /tmp/${TERRAFORM_MODULE_1_NAME}-${TERRAFORM_MODULE_1_SYSTEM}-${TERRAFORM_MODULE_VERSION}.tgz -C ${TERRAFORM_MODULE_1_DIR} --exclude=./.git .
    - 'curl --fail-with-body --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}"
         --upload-file /tmp/${TERRAFORM_MODULE_1_NAME}-${TERRAFORM_MODULE_1_SYSTEM}-${TERRAFORM_MODULE_VERSION}.tgz
         ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/terraform/modules/${TERRAFORM_MODULE_1_NAME}/${TERRAFORM_MODULE_1_SYSTEM}/${TERRAFORM_MODULE_VERSION}/file'
    - TERRAFORM_MODULE_2_NAME=$(echo "${TERRAFORM_MODULE_2_NAME}" | tr " _" -) # module-name must not have spaces or underscores, so translate them to hyphens
    - tar -vczf /tmp/${TERRAFORM_MODULE_2_NAME}-${TERRAFORM_MODULE_2_SYSTEM}-${TERRAFORM_MODULE_VERSION}.tgz -C ${TERRAFORM_MODULE_2_DIR} --exclude=./.git .
    - 'curl --fail-with-body --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}"
         --upload-file /tmp/${TERRAFORM_MODULE_2_NAME}-${TERRAFORM_MODULE_2_SYSTEM}-${TERRAFORM_MODULE_VERSION}.tgz
         ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/terraform/modules/${TERRAFORM_MODULE_2_NAME}/${TERRAFORM_MODULE_2_SYSTEM}/${TERRAFORM_MODULE_VERSION}/file'
    - TERRAFORM_MODULE_3_NAME=$(echo "${TERRAFORM_MODULE_3_NAME}" | tr " _" -) # module-name must not have spaces or underscores, so translate them to hyphens
    - tar -vczf /tmp/${TERRAFORM_MODULE_3_NAME}-${TERRAFORM_MODULE_3_SYSTEM}-${TERRAFORM_MODULE_VERSION}.tgz -C ${TERRAFORM_MODULE_3_DIR} --exclude=./.git .
    - 'curl --fail-with-body --location --header "JOB-TOKEN: ${CI_JOB_TOKEN}"
         --upload-file /tmp/${TERRAFORM_MODULE_3_NAME}-${TERRAFORM_MODULE_3_SYSTEM}-${TERRAFORM_MODULE_VERSION}.tgz
         ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/terraform/modules/${TERRAFORM_MODULE_3_NAME}/${TERRAFORM_MODULE_3_SYSTEM}/${TERRAFORM_MODULE_VERSION}/file'

  rules:
    - if: $CI_COMMIT_TAG